<!DOCTYPE html>
<!-- saved from url=(0021)https://swisslib.org/ -->
<html dir="ltr" lang="fr">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Swiss-Lib</title>
        <link href="css/style.css" rel="stylesheet" />
        <link rel="icon" type="image/x-icon" href="images/favicon-szinwnhl.png">
    </head>

    <body class="no-touch">
        <header>
            <a id="top"></a>
            <!-- Logo -->
            <div id="logo">
                <img src="images/swiss-lib-logo-couleur.svg" />
            </div>
            <h1 class="title">
                    Bienvenue sur Swiss-Lib / Willkommen Swiss-Lib / Benvenuti in Swiss-Lib
            </h1>
            <div class="container">
            </div>
        </header>
        <main>
        <a href="index.html" class="btn-retour">
            Revenir à l'accueil
        </a>
        <!-- Récupération du JSON -->
         <div id="post-container">
            <p>Loading...</p>
         </div>
        <a href="#top" id="back-to-top" aria-label="Retour en haut de page">
            ↑
        </a>
<script>

const params = new URLSearchParams(window.location.search);

const id = new URLSearchParams(location.search)
    .get('id');
console.log(id)


fetch(
  `https://archive-swisslib.deepmining.ch/post_archives.php?id=${encodeURIComponent(id)}`
)
.then(response => response.json())
.then(data => {

    const post = data.post;
    let email = post.author.replace(/\s+at\s+/i, '@').replace(/<[^>]*>/g, '').trim();

    
    let content = post.content;

        // Masquer tout ce qui suit "-------------- next part --------------"
        content = content.replace(
            /(-------------- next part --------------[\s\S]*)$/i,
            `<details class="hidden-part">
                <summary>Afficher le contenu supplémentaire</summary>
                $1
            </details>`
        );


    document.getElementById('post-container').innerHTML = `
        <div class="message-meta">
            <div>
                <span class="label">📍 Adresse :</span>
                ${email}
            </div>
                
            <div>
                <span class="label">👤 Auteur :</span>
                ${post.adresse}
            </div>

            <div>
                <span class="label">📅 Date :</span>
                ${post.date}
            </div>
        </div>

        <div class="card-message">
            ${content}
        </div>
    `;
});

/* Retour en haut */

const backToTop = document.getElementById('back-to-top');

window.addEventListener('scroll', () => {

    if (window.scrollY > 300) {
        backToTop.classList.add('show');
    } else {
        backToTop.classList.remove('show');
    }

});
</script>
        </main>
